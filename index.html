<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sorvegliabilità — U.O. San Lorenzo</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#111318;color:#e8eaf0;min-height:100vh;padding:20px 16px}
.wrap{max-width:820px;margin:0 auto}
.hdr{display:flex;align-items:center;gap:12px;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid #1f2330}
.icon{width:40px;height:40px;background:#1e3a5f;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px}
.badge{background:#1e3a5f;color:#60a5fa;font-size:10px;padding:2px 8px;border-radius:4px;font-weight:600}
.msg{display:none;align-items:center;gap:10px;padding:11px 14px;border-radius:10px;margin:12px 0;font-size:13px}
.msg.L{background:#1a2535;color:#60a5fa;border:1px solid #1e3a5f}
.msg.O{background:#0f2a1a;color:#4ade80;border:1px solid #14532d}
.msg.E{background:#2a1a1a;color:#f87171;border:1px solid #7f1d1d}
.spin{width:14px;height:14px;border:2px solid currentColor;border-top-color:transparent;border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.sec{background:#16191f;border:1px solid #1f2330;border-radius:12px;padding:15px 18px;margin-bottom:12px}
.sh{font-size:11px;font-weight:600;color:#4b5563;text-transform:uppercase;letter-spacing:.7px;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.sh::after{content:'';flex:1;height:1px;background:#1f2330}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px}
.f{display:flex;flex-direction:column;gap:5px}
label{font-size:11px;font-weight:500;color:#6b7280;text-transform:uppercase;letter-spacing:.4px}
.ai{background:#0f2a1a;color:#4ade80;font-size:9px;padding:1px 5px;border-radius:3px;font-weight:600;text-transform:none;margin-left:4px}
input,select,textarea{background:#1c1f28;color:#e8eaf0;border:1px solid #2a2d38;border-radius:8px;padding:8px 11px;font-size:13px;width:100%;outline:none;transition:border-color .15s;font-family:inherit}
input:focus,select:focus,textarea:focus{border-color:#3b82f6}
textarea{resize:vertical;min-height:80px}
.er{display:flex;gap:10px;margin-bottom:8px}
.be{flex:1;padding:11px;border-radius:10px;border:2px solid #2a2d38;background:#1c1f28;color:#9ca3af;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
.be.ok{border-color:#4ade80;background:#0f2a1a;color:#4ade80}
.be.no{border-color:#f87171;background:#2a1a1a;color:#f87171}
.bai{background:#1e3a5f;color:#60a5fa;border:1px solid #1e3a5f;border-radius:8px;padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer;margin-top:8px}
.genbox{display:none;margin-top:8px;background:#0d1f0d;border:1px solid #14532d;border-radius:8px}
.genbox-h{display:flex;justify-content:space-between;padding:8px 12px;border-bottom:1px solid #14532d;font-size:11px;color:#4ade80;font-weight:600}
.genbox textarea{background:transparent;border:none;padding:12px;font-size:13px;color:#d1fae5;min-height:80px}
.tog-row{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.tog{width:44px;height:24px;background:#2a2d38;border-radius:12px;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0}
.knob{width:18px;height:18px;background:#6b7280;border-radius:50%;position:absolute;top:3px;left:3px;transition:all .2s}
.drop{border:2px dashed #2a2d38;border-radius:10px;padding:28px;text-align:center;cursor:pointer;font-size:13px;color:#6b7280;transition:all .2s;margin-bottom:10px}
.drop:hover{border-color:#3b82f6}
.bman{width:100%;background:#0f1a2e;color:#60a5fa;border:1px solid #1e3a5f;border-radius:10px;padding:12px;font-size:13px;font-weight:600;cursor:pointer;margin-top:8px}
.acts{display:flex;gap:10px;padding:4px 0 20px}
.bgen{background:#2563eb;color:#fff;border:none;border-radius:10px;padding:11px 24px;font-size:14px;font-weight:600;cursor:pointer;flex:1}
.bgen:hover{background:#1d4ed8}
.bgen:disabled{background:#374151;opacity:.7;cursor:not-allowed}
.breset{background:transparent;color:#6b7280;border:1px solid #2a2d38;border-radius:10px;padding:11px 18px;font-size:13px;cursor:pointer}
#form{display:none}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <div class="icon">&#128269;</div>
    <div>
      <div style="font-size:16px;font-weight:600">Sorvegliabilità dei Locali &nbsp;<span class="badge">U.O. SAN LORENZO</span></div>
      <div style="font-size:12px;color:#6b7280;margin-top:2px">Amministrativa 2.0</div>
    </div>
  </div>

  <div id="msg" class="msg"></div>

  <div id="up">
    <div class="drop" id="dz">&#128196; <span style="color:#60a5fa">Carica PDF</span> richiesta SUAP oppure trascinalo qui</div>
    <input type="file" id="fi" accept=".pdf" style="display:none">
    <button class="bman" onclick="manuale()">&#9998; Inserisci dati manualmente</button>
  </div>

  <div id="form">
    <div class="sec"><div class="sh">Riferimenti risposta</div>
      <div class="g2">
        <div class="f"><label>PG Risposta</label><input id="pgR" placeholder="es. 285347"></div>
        <div class="f"><label>Data risposta (GG/MM/AA)</label><input id="dataR"></div>
      </div>
    </div>
    <div class="sec"><div class="sh">Riferimenti richiesta SUAP</div>
      <div class="g3">
        <div class="f"><label>N. PG Rif.<span class="ai">AI</span></label><input id="pgRif" placeholder="es. 278374"></div>
        <div class="f"><label>Data rif. (GG.MM.AAAA)<span class="ai">AI</span></label><input id="dataRif"></div>
        <div class="f"><label>Prot. SUAP<span class="ai">AI</span></label><input id="protSUAP" placeholder="es. 1201698/2025"></div>
      </div>
    </div>
    <div class="sec"><div class="sh">Locale</div>
      <div class="g2">
        <div class="f"><label>Ubicazione<span class="ai">AI</span></label><input id="via" placeholder="es. VIA CDN ISOLA F11"></div>
        <div class="f"><label>Titolare<span class="ai">AI</span></label><input id="tit" placeholder="es. BARLETTA GENNARO"></div>
      </div>
    </div>
    <div class="sec"><div class="sh">Sopralluogo</div>
      <div class="g3">
        <div class="f"><label>Data accertamento</label><input id="dataAcc" placeholder="es. 04.03.2026"></div>
        <div class="f"><label>Ora</label><input id="ora" placeholder="es. 12.25"></div>
        <div></div>
      </div>
      <div class="f" style="margin-bottom:12px">
        <label>Esito</label>
        <div class="er">
          <button class="be ok" id="bOk" onclick="setEsito('c')">&#10003; CONFORME</button>
          <button class="be" id="bNo" onclick="setEsito('n')">&#10007; NON CONFORME</button>
        </div>
        <input type="hidden" id="esito" value="c">
      </div>
      <div id="ncRow" style="display:none">
        <div class="f" style="margin-bottom:12px">
          <label>Motivo non conformità <span style="color:#4ade80;font-size:10px">(compare nel documento)</span></label>
          <input id="motivoNC" placeholder="es. privo di adeguata illuminazione dell'accesso principale">
        </div>
        <div class="f" style="margin-bottom:12px">
          <label>Note aggiuntive per AI (opzionale)</label>
          <textarea id="noteNC" rows="2" placeholder="Note extra per la generazione AI..."></textarea>
          <button class="bai" id="bGenNC" onclick="genNC()">&#10022; Genera testo formale</button>
          <div class="genbox" id="genbox">
            <div class="genbox-h"><span>&#10003; Testo generato</span>
              <button onclick="document.getElementById('genbox').style.display='none'" style="background:none;border:none;color:#6b7280;cursor:pointer;font-size:13px">&#10007;</button>
            </div>
            <textarea id="testoNC"></textarea>
          </div>
        </div>
      </div>
      <div class="f"><label>Provvedimenti</label><input id="prov" value="redatto verbale d'ispezione"></div>
    </div>
    <div class="sec"><div class="sh">Agenti</div>
      <div class="g2">
        <div class="f"><label>Agente 1</label><select id="ag1"><option>--</option><option>A.C. FERRARA 3015</option><option>ASS SEBASTIANO 639S</option><option>ASS BATTAGLIA 651S</option><option>AC DI MARTINO 046S</option><option>AG. ESPOSITO 2583</option><option>AG. IAVARONE 3449</option></select></div>
        <div class="f"><label>Agente 2</label><select id="ag2"><option>--</option><option>A.C. FERRARA 3015</option><option>ASS SEBASTIANO 639S</option><option>ASS BATTAGLIA 651S</option><option>AC DI MARTINO 046S</option><option>AG. ESPOSITO 2583</option><option>AG. IAVARONE 3449</option></select></div>
        <div class="f"><label>Agente 3</label><select id="ag3"><option>--</option><option>A.C. FERRARA 3015</option><option>ASS SEBASTIANO 639S</option><option>ASS BATTAGLIA 651S</option><option>AC DI MARTINO 046S</option><option>AG. ESPOSITO 2583</option><option>AG. IAVARONE 3449</option></select></div>
        <div class="f"><label>Agente 4</label><select id="ag4"><option>--</option><option>A.C. FERRARA 3015</option><option>ASS SEBASTIANO 639S</option><option>ASS BATTAGLIA 651S</option><option>AC DI MARTINO 046S</option><option>AG. ESPOSITO 2583</option><option>AG. IAVARONE 3449</option></select></div>
      </div>
    </div>
    <div class="sec"><div class="sh">Lettera di trasmissione</div>
      <div class="tog-row">
        <div class="tog" id="togL" onclick="togLettera()"><div class="knob" id="knobL"></div></div>
        <span id="labelL" style="font-size:13px;color:#6b7280;cursor:pointer" onclick="togLettera()">Genera anche la lettera di trasmissione</span>
      </div>
      <div id="letteraSec" style="display:none">
        <div class="g2">
          <div class="f"><label>PG ingresso</label><input id="pgI" placeholder="es. 285347"></div>
          <div class="f"><label>Data ingresso (GG/MM/AA)</label><input id="dataI"></div>
        </div>
        <div class="g2">
          <div class="f"><label>Area destinataria</label>
            <select id="destA">
              <option value="">-</option>
              <option value="All'Area Sviluppo Socio Economico e Competitivita">All'Area Sviluppo Socio Economico</option>
              <option value="All'Area Sicurezza">All'Area Sicurezza</option>
              <option value="All'Area Ambiente">All'Area Ambiente</option>
              <option value="All'Area Urbanistica">All'Area Urbanistica</option>
            </select>
          </div>
          <div class="f"><label>Ufficio destinatario</label>
            <select id="destU">
              <option value="|">-</option>
              <option value="Servizio SUAP|11.11.0.0.0">Servizio SUAP — 11.11.0.0.0</option>
              <option value="Servizio Mercati|11.1.0.0.0">Servizio Mercati — 11.1.0.0.0</option>
              <option value="Servizio Tutela Ambiente|14.17.0.0.0">Serv. Tutela Ambiente — 14.17.0.0.0</option>
              <option value="Servizio Gestione Canoni e Altri Tributi|41.3.0.0.0">Serv. Gestione Canoni — 41.3.0.0.0</option>
              <option value="Unita Operativa Attivita Tecniche|25.0.6.0.0">U.O. Attivita Tecniche — 25.0.6.0.0</option>
              <option value="Servizio Sportello Unico Edilizia|9.4.0.0.0">Serv. SUE — 9.4.0.0.0</option>
              <option value="Servizio Condono Edilizio|9.8.0.0.0">Serv. Condono Edilizio — 9.8.0.0.0</option>
              <option value="Servizio Polizia Locale|21.0.0.0.0">Serv. Polizia Locale — 21.0.0.0.0</option>
              <option value="Servizio Coordinamento Strategico Operativo|21.65.0.0.0">Serv. Coordinamento — 21.65.0.0.0</option>
            </select>
          </div>
        </div>
        <div class="g2">
          <div class="f" style="margin-bottom:12px"><label>Estensore</label>
            <select id="estensore">
              <option value="A.C. Ferrara">A.C. Ferrara</option>
              <option value="ASS Sebastiano">ASS Sebastiano</option>
              <option value="ASS Battaglia">ASS Battaglia</option>
            </select>
          </div>
        <div class="f"><label>Qualifica firmatario</label>
            <select id="fqual"><option>Il Responsabile di Reparto</option><option>Il Vice Responsabile di Reparto</option></select>
          </div>
          <div class="f"><label>Nome firmatario</label>
            <select id="fnome"><option>S.Ten. Alessandro Autore</option><option>S.Ten. Umberto Aliberti</option></select>
          </div>
        </div>
      </div>
    </div>
    <div class="acts">
      <button class="bgen" id="bGen" onclick="genera()">&#11015; Genera DOCX</button>
      <button class="breset" onclick="reset()">Nuova pratica</button>
    </div>
  </div>
</div>

async function leggiPDF(file){
  mostraMsg('L','Lettura PDF...');
  var b64;
  try{
    b64 = await new Promise(function(res,rej){
      var r=new FileReader();
      r.onload=function(){ res(r.result.split(',')[1]); };
      r.onerror=function(){ rej(new Error('Errore lettura')); };
      r.readAsDataURL(file);
    });
  }catch(e){ mostraMsg('E','Errore lettura: '+e.message); apriForm(); return; }

  mostraMsg('L','Analisi AI in corso...');
  try{
    var resp = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key': API_KEY,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body: JSON.stringify({
        model:'claude-haiku-4-5-20251001',
        max_tokens:600,
        system:'Estrai i campi dalla richiesta SUAP. Rispondi SOLO con JSON senza markdown: {"pgRif":"numero PG","dataRif":"data GG.MM.AAAA","protSUAP":"protocollo SUAP","via":"indirizzo locale","titolare":"nome titolare e locale"}',
        messages:[{role:'user',content:[
          {type:'document',source:{type:'base64',media_type:'application/pdf',data:b64}},
          {type:'text',text:'Estrai i campi.'}
        ]}]
      })
    });
    if(!resp.ok){ mostraMsg('E','Errore API '+resp.status+' — form aperto, compila manualmente'); apriForm(); return; }
    var data = await resp.json();
    if(data.error){ mostraMsg('E','API: '+data.error.message); apriForm(); return; }
    var txt = (data.content||[]).filter(function(b){return b.type==='text';}).map(function(b){return b.text;}).join('');
    var ex = {};
    try{ var m=txt.match(/\{[\s\S]*\}/); if(m) ex=JSON.parse(m[0]); }catch(e){}
    if(ex.pgRif) document.getElementById('pgRif').value=ex.pgRif;
    if(ex.dataRif) document.getElementById('dataRif').value=ex.dataRif;
    if(ex.protSUAP) document.getElementById('protSUAP').value=ex.protSUAP;
    if(ex.via) document.getElementById('via').value=ex.via;
    if(ex.titolare) document.getElementById('tit').value=ex.titolare;
    var n=Object.values(ex).filter(function(v){return v;}).length;
    mostraMsg('O', n>2 ? 'Estrazione completata — '+n+' campi rilevati' : 'PDF non leggibile — compila manualmente');
    apriForm();
  }catch(e){
    mostraMsg('E','Errore: '+e.message+' — form aperto, compila manualmente');
    apriForm();
  }
}

function xe(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function rf(xml,o,n){
  xml=xml.split('<w:t>'+o+'</w:t>').join('<w:t>'+xe(n)+'</w:t>');
  xml=xml.split('<w:t xml:space="preserve">'+o+'</w:t>').join('<w:t xml:space="preserve">'+xe(n)+'</w:t>');
  return xml;
}

      xml=xml.split('<w:t xml:space="preserve">'+accOld+'</w:t>').join('<w:t xml:space="preserve">'+xe(testoFinale)+'</w:t>');
    }
    xml=rf(xml,'redatto verbale d’ispezione',prov);
    xml=rf(xml,'Napoli, li  04 marzo 2026','Napoli, li  '+dataNap);
    xml=rf(xml,'AC DI MARTINO 046S  —  ASS SEBASTIANO 639S',ags);

    zip.file('word/document.xml',xml);
    var blob=await zip.generateAsync({type:'blob',mimeType:'application/vnd.openxmlformats-officedocument.wordprocessingml.document'});
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a'); a.href=url; a.download='Sorv_PG_'+pg+'.docx'; a.click();
    setTimeout(function(){URL.revokeObjectURL(url);},5000);

    if(letteraOn){
      var pgI=document.getElementById('pgI').value.trim();
      var dataI=document.getElementById('dataI').value.trim()||dataR;
      var dA=document.getElementById('destA'); var dU=document.getElementById('destU');
      var areaVal=dA.options[dA.selectedIndex].value||"All'Area Sviluppo Socio Economico e Competitivita";
      var uffVal=dU.options[dU.selectedIndex].value||'|';
      var uffParts=uffVal.split('|');
      var fq=document.getElementById('fqual'); var fn=document.getElementById('fnome');
      var zipL=await JSZip.loadAsync(B64_LET,{base64:true});
      var xmlL=await zipL.file('word/document.xml').async('string');
      xmlL=xmlL.split('<w:t>All’Area Sviluppo Socio Economico e Competitività</w:t>').join('<w:t>'+xe(areaVal)+'</w:t>');
      xmlL=xmlL.split('<w:t xml:space="preserve">All’Area Sviluppo Socio Economico e Competitività</w:t>').join('<w:t xml:space="preserve">'+xe(areaVal)+'</w:t>');
      xmlL=rf(xmlL,'Servizio SUAP',uffParts[0]||'');
      xmlL=rf(xmlL,'Indirizzo di protocollo 11.11.0.0.0','Indirizzo di protocollo '+(uffParts[1]||''));
      xmlL=rf(xmlL,'PG/2026/375181',pg);
      xmlL=xmlL.split('<w:t>   del   28/03/26</w:t>').join('<w:t>   del   '+xe(dataI)+'</w:t>');
      xmlL=xmlL.split('<w:t xml:space="preserve">   del   28/03/26</w:t>').join('<w:t xml:space="preserve">   del   '+xe(dataI)+'</w:t>');
      xmlL=rf(xmlL,'PG/2026/301627','PG/2026/'+pgRif);
      xmlL=rf(xmlL,'c_f839/Comune_di_Napoli 1176287/17-12-2025',protSUAP||'');
      xmlL=rf(xmlL,'CONTROLLO POSTEGGIO MERCATO CARAMANICO','SORVEGLIABILITA DEI LOCALI - '+tit);
      xmlL=rf(xmlL,'CRISTIANO VINCENZO',tit);
      xmlL=rf(xmlL,'POSTEGGIO 269 - INT MERCATO',via);
      xmlL=rf(xmlL,'ASS BATTAGLIA 651S',ags);
      var est=document.getElementById('estensore');
      if(est) xmlL=rf(xmlL,'Battaglia',est.options[est.selectedIndex].value);
      xmlL=rf(xmlL,'Napoli, li  28/03/26','Napoli, li  '+dataI);
      xmlL=rf(xmlL,'Il Responsabile di Reparto',fq.options[fq.selectedIndex].text);
      xmlL=rf(xmlL,'S.Ten. Alessandro Autore',fn.options[fn.selectedIndex].text);
      zipL.file('word/document.xml',xmlL);
      var blobL=await zipL.generateAsync({type:'blob',mimeType:'application/vnd.openxmlformats-officedocument.wordprocessingml.document'});
      setTimeout(function(){
        var urlL=URL.createObjectURL(blobL); var aL=document.createElement('a');
        aL.href=urlL; aL.download='Lettera_Sorv_'+pg+'.docx'; aL.click();
        setTimeout(function(){URL.revokeObjectURL(urlL);},5000);
      },800);
      mostraMsg('O','&#10003; Scaricati 2 file: Sorvegliabilita + Lettera');
    } else {
      mostraMsg('O','&#10003; Scaricato: Sorv_PG_'+pg+'.docx');
    }
  }catch(e){ mostraMsg('E','Errore: '+e.message); }
  btn.disabled=false; btn.innerHTML='&#11015; Genera DOCX';
}
